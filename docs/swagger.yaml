basePath: /
definitions:
  dto.BulkInsertScoresRequest:
    properties:
      judges_id:
        type: string
      regis_id:
        type: string
      scores:
        items:
          $ref: '#/definitions/dto.ScoreInput'
        type: array
    required:
    - judges_id
    - regis_id
    - scores
    type: object
  dto.BulkInsertViolationsRequest:
    properties:
      judges_id:
        type: string
      regis_id:
        type: string
      violation_type_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - judges_id
    - regis_id
    - violation_type_ids
    type: object
  dto.CreateJudgeReq:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateScoreCategoryReq:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateScoreSubCategoryReq:
    properties:
      name:
        type: string
      score_categories_id:
        type: string
    required:
    - name
    - score_categories_id
    type: object
  dto.CreateViolationTypeReq:
    properties:
      name:
        type: string
      point:
        minimum: 0
        type: number
    required:
    - name
    - point
    type: object
  dto.CustomLeaderboardRequest:
    properties:
      score_category_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - score_category_ids
    type: object
  dto.EOTeamApproveReq:
    properties:
      payment_status:
        allOf:
        - $ref: '#/definitions/enums.RegistrationStatus'
        enum:
        - DP_PAID
        - FULL_PAID
    required:
    - payment_status
    type: object
  dto.EOTeamRejectReq:
    properties:
      rejection_reason:
        type: string
    required:
    - rejection_reason
    type: object
  dto.EventCreate:
    properties:
      bank_name:
        type: string
      bank_number:
        type: string
      close_date:
        type: string
      location:
        type: string
      nama_pj:
        type: string
      name:
        type: string
      no_wa_pj:
        type: string
      open_date:
        type: string
      user_id:
        type: string
    type: object
  dto.EventLevelCreate:
    properties:
      dp_fee:
        type: string
      event_id:
        type: string
      name:
        type: string
      regis_fee:
        type: string
    type: object
  dto.EventLevelUpdate:
    properties:
      dp_fee:
        type: string
      event_id:
        type: string
      id:
        type: string
      name:
        type: string
      regis_fee:
        type: string
    type: object
  dto.EventUpdate:
    properties:
      bank_name:
        type: string
      bank_number:
        type: string
      close_date:
        type: string
      compe_date:
        type: string
      description:
        type: string
      location:
        type: string
      max_team_members:
        type: integer
      min_team_members:
        type: integer
      name:
        type: string
      name_pj:
        type: string
      no_wa_pj:
        type: string
      open_date:
        type: string
      organizer:
        type: string
      status:
        type: string
      user_id:
        type: string
      wa_group:
        type: string
    type: object
  dto.GradeRuleItemReq:
    properties:
      grade_name:
        enum:
        - Kurang
        - Cukup
        - Baik
        - Sangat Baik
        type: string
      max_score:
        type: number
      min_score:
        minimum: 0
        type: number
    required:
    - grade_name
    type: object
  dto.InputScoreReq:
    properties:
      judges_id:
        type: string
      regis_id:
        type: string
      score_value:
        minimum: 0
        type: number
      sub_category_id:
        type: string
    required:
    - judges_id
    - regis_id
    - score_value
    - sub_category_id
    type: object
  dto.PublishScoreboardRequest:
    properties:
      is_score_published:
        type: boolean
    type: object
  dto.ScoreInput:
    properties:
      score_value:
        minimum: 0
        type: number
      sub_category_id:
        type: string
    required:
    - score_value
    - sub_category_id
    type: object
  dto.SetupGradeRulesReq:
    properties:
      rules:
        items:
          $ref: '#/definitions/dto.GradeRuleItemReq'
        type: array
    required:
    - rules
    type: object
  dto.UpdateInstitutionRequest:
    properties:
      address:
        type: string
      institution_type:
        type: string
      name:
        type: string
      name_pj:
        type: string
      no_wa_pj:
        type: string
    required:
    - address
    - institution_type
    - name
    - name_pj
    - no_wa_pj
    type: object
  dto.UpdateJudgeReq:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.UpdatePasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - confirm_password
    - new_password
    - old_password
    type: object
  dto.UpdateScoreCategoryReq:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.UpdateScoreSubCategoryReq:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.UpdateViolationTypeReq:
    properties:
      name:
        type: string
      point:
        minimum: 0
        type: number
    required:
    - name
    - point
    type: object
  dto.UserForgotPassword:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.UserLogin:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.UserRegister:
    properties:
      confirm_password:
        maxLength: 40
        minLength: 6
        type: string
      email:
        type: string
      password:
        maxLength: 40
        minLength: 6
        type: string
    required:
    - confirm_password
    - email
    - password
    type: object
  dto.UserResetPassword:
    properties:
      confirm_password:
        maxLength: 20
        minLength: 6
        type: string
      password:
        maxLength: 20
        minLength: 6
        type: string
    required:
    - confirm_password
    - password
    type: object
  enums.RegistrationStatus:
    enum:
    - WAITING
    - DP_PAID
    - FULL_PAID
    - REJECTED
    type: string
    x-enum-varnames:
    - Waiting
    - DPPaid
    - FullPaid
    - Rejected
